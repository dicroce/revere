name: revere
base: core22
version: '0.1'
summary: Open source, cross platform ONVIF compatible video surveillance.
description: |
  A free, open source, onvif compatible, cross platform video surveillance system designed to run unobtrusively on standard desktop computers.
grade: stable
confinement: strict

apps:
  revere:
    command: bin/desktop-launch $SNAP/usr/local/revere/revere
    plugs: [process-control, home, network, network-bind, network-control, network-manager, network-manager-observe, network-observe, network-setup-control, network-setup-observe, network-status, removable-media, opengl, desktop, avahi-control, avahi-observe]
  vision:
    command: bin/desktop-launch $SNAP/usr/local/revere/vision
    plugs: [process-control, home, network, network-bind, network-control, network-manager, network-manager-observe, network-observe, network-setup-control, network-setup-observe, network-status, removable-media, opengl, desktop, avahi-control, avahi-observe]

parts:
  revere:
    plugin: cmake
    source-type: git
    source: https://github.com/dicroce/revere
    build-packages:
      - git
      - zip
      - unzip
      - tar
      - cmake
      - pkg-config
      - nasm
      - libxinerama-dev
      - libxcursor-dev
      - xorg-dev
      - libglu1-mesa-dev
      - bison
      - python3-distutils
      - flex
      - libgtk-3-dev
      - libayatana-appindicator3-dev
      - libunwind-dev
      - libcurl4-openssl-dev
      - build-essential
    stage-packages:
      - libcurl4
      - lzip
      - libxinerama1
      - libxcursor1
      - libglu1-mesa
      - libayatana-appindicator3-1
      - libunwind8
      - mesa-utils
      - libglu1-mesa
      - libgl1-mesa-glx
      - libglx0
      - libgl1-mesa-dri
      - xserver-xorg-video-all
    after:
      - desktop-glib-only

  desktop-glib-only:
    source: https://github.com/ubuntu/snapcraft-desktop-helpers.git
    source-subdir: glib-only
    plugin: make
    build-packages:
      - libglib2.0-dev
    stage-packages:
      - libglib2.0-bin
